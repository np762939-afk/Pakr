name: Build APK

on:
  workflow_dispatch:
    inputs:
      app_name:
        description: 'App Name'
        required: true
        default: 'Barbos Loader'
      package_name:
        description: 'Package Name'
        required: true
        default: 'com.barbos.loader'
      version_name:
        description: 'Version Name'
        required: true
        default: '1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        run: |
          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip commandlinetools-linux-11076708_latest.zip
          mkdir -p android-sdk/cmdline-tools
          mv cmdline-tools android-sdk/cmdline-tools/latest
          export ANDROID_SDK_ROOT=$PWD/android-sdk
          export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin
          echo "y" | sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Build APK
        run: |
          export ANDROID_SDK_ROOT=$PWD/android-sdk
          export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/java/com/example/app
          echo '<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="${{ github.event.inputs.package_name }}">
              <application android:label="${{ github.event.inputs.app_name }}">
                  <activity android:name=".MainActivity">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>' > app/src/main/AndroidManifest.xml
          echo 'package com.example.app;
          import android.app.Activity;
          import android.os.Bundle;
          import android.widget.TextView;
          public class MainActivity extends Activity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  TextView tv = new TextView(this);
                  tv.setText("Hello from ${{ github.event.inputs.app_name }}!");
                  setContentView(tv);
              }
          }' > app/src/main/java/com/example/app/MainActivity.java
          echo 'apply plugin: "com.android.application"
          android {
              compileSdk 34
              defaultConfig {
                  applicationId "${{ github.event.inputs.package_name }}"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "${{ github.event.inputs.version_name }}"
              }
          }
          repositories {
              google()
              mavenCentral()
          }
          dependencies {
              implementation "androidx.appcompat:appcompat:1.6.1"
          }' > app/build.gradle
          echo 'rootProject.name = "MyApp"
          include ":app"' > settings.gradle
          echo 'buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath "com.android.tools.build:gradle:8.1.0"
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }' > build.gradle
          wget https://services.gradle.org/distributions/gradle-8.1.0-bin.zip
          unzip gradle-8.1.0-bin.zip -d /tmp/
          /tmp/gradle-8.1.0/bin/gradle assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BarbosLoader
          path: app/build/outputs/apk/release/*.apk
